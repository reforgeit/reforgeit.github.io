<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Theme color for browser UI -->
<meta name="theme-color" content="#0d1117">
<meta name="msapplication-TileColor" content="#0d1117">

<!-- Apple-specific meta tags -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<!-- Favicon -->
<link rel="icon" type="image/x-icon" href="{{ '/favicon.ico' | relative_url }}">
<link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/images/favicon-32x32.png' | relative_url }}">
<link rel="icon" type="image/png" sizes="16x16" href="{{ '/assets/images/favicon-16x16.png' | relative_url }}">
<link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/images/apple-touch-icon.png' | relative_url }}">

<!-- Google Fonts: async load to avoid render-blocking -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Share+Tech+Mono&display=swap">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Share+Tech+Mono&display=swap" media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Share+Tech+Mono&display=swap"></noscript>

{% seo %}
<link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
{% feed_meta %}

<!-- Structured data: Person -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Person",
  "name": "{{ site.author.name }}",
  "jobTitle": "{{ site.tagline }}",
  "url": "{{ site.url }}",
  "sameAs": [
    "https://linkedin.com/in/{{ site.author.linkedin }}",
    "https://github.com/{{ site.author.github }}"
  ],
  "address": {
    "@type": "PostalAddress",
    "addressLocality": "Poznan",
    "addressCountry": "PL"
  },
  "knowsAbout": ["AWS", "Kubernetes", "Terraform", "DevOps", "Platform Engineering", "GitHub Actions", "ArgoCD"]
}
</script>
